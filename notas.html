<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lancamento de notas - ETDA</title>
<style>:root{--brand:#4457c0;--bg:#f6f7fb;--line:#dde3ef;--muted:#687385;--ok:#13834a;--danger:#b43f4c}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial;color:#1d2733}.shell{width:min(1050px,calc(100% - 24px));margin:auto;padding:24px 0}.top,.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.top{justify-content:space-between}.panel{margin-top:16px;padding:18px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:0 14px 34px rgba(37,47,77,.09)}h1{margin:0}p{color:var(--muted)}label{display:grid;gap:7px;font-size:.84rem;font-weight:800}.filters{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end}select,input{min-height:42px;padding:9px;border:1px solid var(--line);border-radius:6px;font:inherit}button,a{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:6px;font-weight:900;text-decoration:none}button{border:0;background:var(--brand);color:#fff;cursor:pointer}.ghost{border:1px solid var(--line);background:#fff;color:var(--brand)}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left}th{font-size:.76rem;color:var(--muted)}td input{width:120px}.message{font-weight:800}.ok{color:var(--ok)}.error{color:var(--danger)}@media(max-width:720px){.filters{grid-template-columns:1fr}.table{overflow:auto}}</style></head>
<style>.system-header{margin-bottom:18px;border:1px solid var(--line);border-radius:11px;background:#fff;box-shadow:0 12px 30px rgba(37,47,77,.09);overflow:hidden}.system-main{display:flex;align-items:center;justify-content:space-between;padding:13px 15px}.system-brand{display:flex;align-items:center;gap:10px;color:#1d2733;text-decoration:none}.system-brand>span:last-child{display:grid;font-weight:900}.system-brand small{color:var(--muted);font-size:.68rem;text-transform:uppercase}.brand-symbol{display:grid!important;place-items:center;width:38px;height:38px;border-radius:9px;background:var(--brand);color:#fff;font-size:.78rem}.system-nav{display:flex;gap:4px;padding:7px;border-top:1px solid var(--line);background:#f8f9fc;overflow-x:auto}.system-nav a{min-height:38px;padding:0 11px;color:#536174;font-size:.83rem;white-space:nowrap}.system-nav a.active{background:var(--brand);color:#fff}.logout{min-height:36px;background:#fff;color:var(--danger);border:1px solid #efc9ce}.page-heading{margin-bottom:14px}.table{overflow-x:auto}@media(max-width:720px){.shell{width:min(100% - 16px,1050px);padding:10px 0 22px}.system-nav a{min-height:40px}.panel{padding:14px}.filters button{width:100%}table{min-width:560px}.page-heading h1{font-size:1.65rem}}</style>
<body><main class="shell"><header class="system-header"><div class="system-main"><a class="system-brand" href="index.html"><span class="brand-symbol">ETDA</span><span>ETDA Manaus<small>Gestão acadêmica</small></span></a><button id="logout" class="logout" type="button">Sair</button></div><nav class="system-nav"><a href="cursos.html">Dashboard</a><a href="secretaria.html">Secretaria</a><a href="presenca.html">Presença</a><a class="active" href="notas.html">Notas</a><a href="trocar-senha-presenca.html">Minha senha</a></nav></header><div class="page-heading"><h1>Lançamento de notas</h1><p id="identity">Carregando acesso...</p></div>
<section class="panel"><div class="filters"><label>Curso<select id="course"></select></label><label id="moduleLabel">Módulo<select id="module"></select></label><label>Semestre<select id="period"><option value="">Selecione</option><option>1º semestre</option><option>2º semestre</option></select></label><button id="save" type="button">Salvar notas</button></div><p id="message" class="message"></p></section>
<section class="panel table"><table><thead><tr><th>Aluno</th><th>Curso</th><th>Nota (0 a 10)</th></tr></thead><tbody id="rows"></tbody></table></section></main>
<script>
const course=document.querySelector('#course'),moduleSelect=document.querySelector('#module'),moduleLabel=document.querySelector('#moduleLabel'),period=document.querySelector('#period'),rows=document.querySelector('#rows'),message=document.querySelector('#message'),identity=document.querySelector('#identity');
let access=null,enrollments=[],records=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function scopes(){return access?.scopes||[{course:access?.course,module:access?.module||''}]}
function configure(){const courses=[...new Set(scopes().map(s=>s.course).filter(Boolean))];course.innerHTML=courses.map(c=>`<option>${esc(c)}</option>`).join('');identity.textContent=access.role==='admin'?'Administrador':`${access.name} · ${courses.join(', ')}`;configureModules();render()}
function configureModules(){const isCfo=course.value==='CFO';moduleLabel.hidden=!isCfo;const modules=scopes().filter(s=>s.course==='CFO'&&s.module).map(s=>s.module);moduleSelect.innerHTML=modules.map(m=>`<option>${esc(m)}</option>`).join('')}
function currentGrade(student){const record=records.find(r=>r.enrollmentId===student.id&&r.period===period.value);if(!record)return'';const name=course.value==='CFO'?moduleSelect.value:'Nota final';const item=(record.modules||[]).find(m=>m.name===name);return item?.grade??item?.total??''}
function render(){const students=enrollments.filter(e=>e.grade===course.value&&String(e.status||'').toLowerCase().includes('ativa'));rows.innerHTML=students.map(s=>`<tr><td>${esc(s.fullName)}</td><td>${esc(s.grade)}</td><td><input type="number" min="0" max="10" step="0.01" data-id="${esc(s.id)}" value="${esc(currentGrade(s))}"></td></tr>`).join('')||'<tr><td colspan="3">Nenhum aluno ativo neste curso.</td></tr>'}
async function load(){const session=await fetch('/api/session',{credentials:'same-origin'});if(!session.ok){location.href='presenca.html';return}access=await session.json();const [studentsResponse,gradesResponse]=await Promise.all([fetch('/api/enrollments',{credentials:'same-origin'}),fetch('/api/gradebook',{credentials:'same-origin'})]);if(!studentsResponse.ok||!gradesResponse.ok)throw new Error('Não foi possível carregar os dados.');enrollments=(await studentsResponse.json()).enrollments||[];records=(await gradesResponse.json()).records||[];configure()}
async function save(){if(!period.value){message.textContent='Selecione o semestre.';message.className='message error';return}const inputs=[...rows.querySelectorAll('input[data-id]')].filter(i=>i.value!=='');message.textContent='Salvando...';for(const input of inputs){const response=await fetch('/api/gradebook',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({enrollmentId:input.dataset.id,period:period.value,moduleName:course.value==='CFO'?moduleSelect.value:'Nota final',grade:Number(input.value)})});const data=await response.json();if(!response.ok)throw new Error(data.error||'Erro ao salvar notas.')}message.textContent='Notas salvas com sucesso.';message.className='message ok';const response=await fetch('/api/gradebook',{credentials:'same-origin'});records=(await response.json()).records||[];render()}
course.addEventListener('change',()=>{configureModules();render()});moduleSelect.addEventListener('change',render);period.addEventListener('change',render);document.querySelector('#save').addEventListener('click',()=>save().catch(e=>{message.textContent=e.message;message.className='message error'}));document.querySelector('#logout').addEventListener('click',async()=>{await fetch('/api/session',{method:'DELETE',credentials:'same-origin'});location.href='presenca.html'});load().catch(e=>{message.textContent=e.message;message.className='message error'});
</script></body></html>
