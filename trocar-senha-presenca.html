<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trocar senha - Presenca ETDA</title><style>
:root{--brand:#4457c0;--bg:#f6f7fb;--line:#dde3ef;--muted:#687385}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:Arial;color:#1d2733}.card{width:min(440px,calc(100% - 24px));padding:26px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:0 18px 40px rgba(37,47,77,.11)}h1{margin:0 0 8px}p{color:var(--muted)}label{display:grid;gap:7px;margin-top:14px;font-size:.86rem;font-weight:800}input{min-height:43px;padding:10px;border:1px solid var(--line);border-radius:6px;font:inherit}button,a{display:flex;align-items:center;justify-content:center;min-height:43px;margin-top:16px;border-radius:6px;font-weight:900}button{width:100%;border:0;background:var(--brand);color:#fff;font:inherit;cursor:pointer}a{color:var(--brand)}.message{font-weight:800}.ok{color:#13834a}.error{color:#b43f4c}</style></head><body><main class="card"><h1>Trocar minha senha</h1><p>Você precisa estar conectado com sua conta de professor.</p><form id="form"><label>Senha atual<input id="current" type="password" required></label><label>Nova senha<input id="next" type="password" minlength="6" required></label><label>Confirmar nova senha<input id="confirm" type="password" minlength="6" required></label><p id="message" class="message"></p><button type="submit">Atualizar senha</button></form><a href="presenca.html">Voltar à presença</a></main><script>
const form=document.querySelector('#form'),message=document.querySelector('#message'),currentInput=document.querySelector('#current'),nextInput=document.querySelector('#next'),confirmInput=document.querySelector('#confirm');form.addEventListener('submit',async(e)=>{e.preventDefault();if(nextInput.value!==confirmInput.value){message.textContent='As novas senhas não conferem.';message.className='message error';return}try{const r=await fetch('/api/attendance-password',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json','accept':'application/json'},body:JSON.stringify({currentPassword:currentInput.value,newPassword:nextInput.value})});const d=await r.json();if(!r.ok)throw new Error(d.error);message.textContent='Senha atualizada com sucesso.';message.className='message ok';form.reset()}catch(err){message.textContent=err.message||'Não foi possível trocar.';message.className='message error'}});
</script></body></html>
