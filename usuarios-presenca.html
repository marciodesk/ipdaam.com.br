<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Usuarios da presenca - ETDA</title>
<style>:root{--brand:#4457c0;--bg:#f6f7fb;--line:#dde3ef;--muted:#687385;--ok:#13834a;--danger:#b43f4c}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial;color:#1d2733}.shell{width:min(1180px,calc(100% - 24px));margin:auto;padding:24px 0}.panel{margin-bottom:16px;padding:20px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:0 14px 34px rgba(37,47,77,.09)}h1,h2{margin:0 0 8px}p{color:var(--muted)}.form{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px}.scope-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px;padding:14px;border-radius:7px;background:#eef4ff}.scope-grid label{display:flex;align-items:center;gap:8px;margin:0}.scope-grid input{width:18px;min-height:18px}label{display:grid;gap:7px;font-size:.84rem;font-weight:800}input{min-height:42px;padding:10px;border:1px solid var(--line);border-radius:6px;font:inherit}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}button,a{display:inline-flex;align-items:center;justify-content:center;min-height:39px;padding:0 13px;border-radius:6px;font-weight:900;text-decoration:none;cursor:pointer}button{border:0;background:var(--brand);color:#fff}.ghost{border:1px solid var(--line);background:#fff;color:var(--brand)}.approve{background:var(--ok)}.danger{background:#fff;color:var(--danger);border:1px solid #efc9ce}.table{overflow:auto}table{width:100%;min-width:880px;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left}th{font-size:.76rem;color:var(--muted)}.pending{color:#9a6900;font-weight:900}.active{color:var(--ok);font-weight:900}.message{font-weight:800}.error{color:var(--danger)}@media(max-width:760px){.form,.scope-grid{grid-template-columns:1fr}}</style></head>
<body><main class="shell"><div class="actions"><a class="ghost" href="presenca.html">Voltar à presença</a></div>
<section class="panel"><h1>Painel de usuários</h1><p>Aprove solicitações, cadastre professores, permita vários cursos e redefina senhas.</p>
<form id="form"><input id="editingId" type="hidden"><div class="form"><label>Nome<input id="userName" required></label><label>Login<input id="userLogin" required></label><label>Nova senha <small>(mínimo 6 caracteres)</small><input id="userPassword" type="password" minlength="6" required></label></div>
<div class="scope-grid"><label><input type="checkbox" data-scope="ALFA"> ALFA</label><label><input type="checkbox" data-scope="INC"> INC</label><label><input type="checkbox" data-scope="CFO" data-module="Teologia Basica"> CFO — Teologia Básica</label><label><input type="checkbox" data-scope="CFO" data-module="Etica Crista"> CFO — Ética Cristã</label><label><input type="checkbox" data-scope="CFO" data-module="Pratica Ministerial"> CFO — Prática Ministerial</label></div>
<div class="actions"><button type="submit">Salvar usuário e senha</button><button id="cancel" class="ghost" type="button" hidden>Cancelar edição</button></div><p id="message" class="message"></p></form></section>
<section class="panel"><h2>Solicitações e usuários</h2><div class="table"><table><thead><tr><th>Nome</th><th>Login</th><th>Responsabilidades</th><th>Status</th><th>Ações</th></tr></thead><tbody id="rows"></tbody></table></div></section></main>
<script>
const form=document.querySelector('#form');
const rows=document.querySelector('#rows');
const message=document.querySelector('#message');
const cancel=document.querySelector('#cancel');
const editingId=document.querySelector('#editingId');
const userName=document.querySelector('#userName');
const userLogin=document.querySelector('#userLogin');
const userPassword=document.querySelector('#userPassword');
let users=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const scopeLabel=s=>s.course==='CFO'?`CFO — ${{'Teologia Basica':'Teologia Básica','Etica Crista':'Ética Cristã','Pratica Ministerial':'Prática Ministerial'}[s.module]||s.module}`:s.course;
function selectedScopes(){return[...document.querySelectorAll('[data-scope]:checked')].map(i=>({course:i.dataset.scope,module:i.dataset.module||''}))}
function reset(){form.reset();editingId.value='';cancel.hidden=true;message.textContent=''}
async function load(){const r=await fetch('/api/attendance-users',{credentials:'same-origin',headers:{accept:'application/json'}});const d=await r.json();if(!r.ok){document.querySelector('.shell').innerHTML=`<section class="panel"><h1>Acesso administrativo necessário</h1><p>${esc(d.error)}</p><a class="ghost" href="presenca.html">Entrar na presença</a></section>`;return}users=d.users||[];rows.innerHTML=users.map(u=>`<tr><td>${esc(u.name)}</td><td>${esc(u.login)}</td><td>${esc((u.scopes||[]).map(scopeLabel).join(', '))}</td><td class="${u.active?'active':'pending'}">${u.active?'Ativo':'Pendente/Inativo'}</td><td><div class="actions"><button class="ghost" data-edit="${esc(u.id)}">Editar/redefinir senha</button>${u.active?`<button class="danger" data-disable="${esc(u.id)}">Desativar</button>`:`<button class="approve" data-approve="${esc(u.id)}">Aprovar</button>`}</div></td></tr>`).join('')||'<tr><td colspan="5">Nenhum usuário.</td></tr>'}
form.addEventListener('submit',async e=>{e.preventDefault();try{const r=await fetch('/api/attendance-users',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json',accept:'application/json'},body:JSON.stringify({id:editingId.value||undefined,name:userName.value,login:userLogin.value,password:userPassword.value,scopes:selectedScopes()})});const d=await r.json();if(!r.ok)throw new Error(d.error);reset();await load()}catch(err){message.textContent=err.message;message.className='message error'}});
rows.addEventListener('click',async e=>{const edit=e.target.closest('[data-edit]'),approve=e.target.closest('[data-approve]'),disable=e.target.closest('[data-disable]');if(edit){const u=users.find(x=>x.id===edit.dataset.edit);editingId.value=u.id;userName.value=u.name;userLogin.value=u.login;document.querySelectorAll('[data-scope]').forEach(i=>i.checked=(u.scopes||[]).some(s=>s.course===i.dataset.scope&&(s.course!=='CFO'||s.module===i.dataset.module)));userPassword.value='';cancel.hidden=false;scrollTo({top:0,behavior:'smooth'});return}const button=approve||disable;if(!button)return;const method=approve?'PUT':'DELETE';const id=approve?approve.dataset.approve:disable.dataset.disable;const r=await fetch(`/api/attendance-users?id=${encodeURIComponent(id)}`,{method,credentials:'same-origin',headers:{accept:'application/json'}});const d=await r.json();if(!r.ok){message.textContent=d.error;message.className='message error';return}await load()});
cancel.addEventListener('click',reset);load();
</script></body></html>
