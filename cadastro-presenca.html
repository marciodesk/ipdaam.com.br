<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solicitar acesso - Presenca ETDA</title><style>
:root{--brand:#4457c0;--bg:#f6f7fb;--line:#dde3ef;--muted:#687385}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:Arial;color:#1d2733}.card{width:min(540px,calc(100% - 24px));padding:26px;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:0 18px 40px rgba(37,47,77,.11)}h1{margin:0 0 8px}p{color:var(--muted);line-height:1.4}label{display:grid;gap:7px;margin-top:14px;font-size:.86rem;font-weight:800}input{min-height:43px;padding:10px;border:1px solid var(--line);border-radius:6px;font:inherit}.options{display:grid;gap:9px;margin-top:12px;padding:14px;background:#eef4ff;border-radius:7px}.options label{display:flex;align-items:center;gap:9px;margin:0}.options input{min-height:auto;width:18px;height:18px}button,a{display:flex;align-items:center;justify-content:center;min-height:43px;margin-top:16px;border-radius:6px;font-weight:900}button{width:100%;border:0;background:var(--brand);color:#fff;font:inherit;cursor:pointer}a{color:var(--brand)}.message{font-weight:800}.ok{color:#13834a}.error{color:#b43f4c}</style></head><body><main class="card"><h1>Solicitar acesso</h1><p>Crie seu login e indique todos os cursos e módulos sob sua responsabilidade. O acesso será liberado após aprovação administrativa.</p><form id="form"><label>Nome completo<input id="name" required></label><label>Login desejado<input id="login" required></label><label>Senha<input id="password" type="password" minlength="6" required></label><div class="options"><strong>Cursos e módulos</strong><label><input type="checkbox" data-course="ALFA"> ALFA</label><label><input type="checkbox" data-course="INC"> INC</label><label><input type="checkbox" data-course="CFO" data-module="Teologia Basica"> CFO — Teologia Básica</label><label><input type="checkbox" data-course="CFO" data-module="Etica Crista"> CFO — Ética Cristã</label><label><input type="checkbox" data-course="CFO" data-module="Pratica Ministerial"> CFO — Prática Ministerial</label></div><p id="message" class="message"></p><button type="submit">Enviar solicitação</button></form><a href="presenca.html">Voltar ao login</a></main><script>
const form=document.querySelector('#form'),message=document.querySelector('#message');form.addEventListener('submit',async(e)=>{e.preventDefault();message.textContent='Enviando...';message.className='message';const scopes=[...document.querySelectorAll('[data-course]:checked')].map(i=>({course:i.dataset.course,module:i.dataset.module||''}));try{const r=await fetch('/api/attendance-register',{method:'POST',headers:{'content-type':'application/json','accept':'application/json'},body:JSON.stringify({name:document.querySelector('#name').value,login:document.querySelector('#login').value,password:document.querySelector('#password').value,scopes})});const d=await r.json();if(!r.ok)throw new Error(d.error);message.textContent=d.message;message.className='message ok';form.reset()}catch(err){message.textContent=err.message||'Não foi possível enviar.';message.className='message error'}});
</script></body></html>
